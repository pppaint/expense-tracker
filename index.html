<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Expenses"/>
<meta name="theme-color" content="#0a0a0c"/>
<title>Expenses</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0c;
  --surface: #141416;
  --surface2: #1c1c20;
  --surface3: #242428;
  --green: #22c55e;
  --green-dim: #16a34a;
  --green-soft: #0d2818;
  --green-border: #1a4a2a;
  --text: #f0f0f2;
  --muted: #72727a;
  --muted2: #4a4a52;
  --border: #222226;
  --danger: #ef4444;
  --danger-soft: #2a1010;
  --radius: 20px;
  --radius-sm: 14px;
  --font: 'DM Sans', -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: calc(80px + env(safe-area-inset-bottom)); overflow-x: hidden; }

/* ── PAGES ── */
.page { display: none; padding: 0 16px 24px; }
.page.active { display: block; }

/* ── TOP HEADER ── */
.top-bar { padding: calc(env(safe-area-inset-top) + 20px) 16px 16px; display: flex; justify-content: space-between; align-items: flex-end; }
.top-bar h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
.top-bar .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
.top-right { text-align: right; }
.today-total { font-size: 28px; font-weight: 600; color: var(--green); letter-spacing: -0.5px; }

/* ── TRAVEL BANNER ── */
.travel-banner { margin: 0 16px 14px; border-radius: var(--radius); padding: 13px 16px; display: flex; align-items: center; gap: 12px; background: var(--green-soft); border: 1px solid var(--green-border); }
.travel-banner.off { background: var(--surface); border-color: var(--border); }
.travel-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; box-shadow: 0 0 6px var(--green); }
.travel-dot.off { background: var(--muted2); box-shadow: none; }
.travel-info { flex: 1; min-width: 0; }
.travel-name { font-size: 14px; font-weight: 500; color: var(--green); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.travel-name.off { color: var(--muted); }
.travel-meta { font-size: 12px; color: var(--muted); margin-top: 1px; }
.travel-btn { padding: 7px 14px; border-radius: 30px; border: 1px solid var(--green-border); background: transparent; font-size: 12px; font-weight: 500; color: var(--green); cursor: pointer; font-family: var(--font); white-space: nowrap; }
.travel-btn.off { border-color: var(--border); color: var(--muted); }

/* ── AMOUNT INPUT CARD ── */
.amount-card { background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 12px; border: 1px solid var(--border); }
.amount-display { font-size: 52px; font-weight: 600; color: var(--green); letter-spacing: -2px; text-align: right; min-height: 64px; line-height: 1; margin-bottom: 6px; display: flex; align-items: center; justify-content: flex-end; gap: 2px; }
.amount-display .cursor { width: 2px; height: 48px; background: var(--green); border-radius: 2px; animation: blink 1s infinite; flex-shrink: 0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.amount-display .placeholder { color: var(--muted2); }
.amount-input-real { position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px; }
.amount-tap-area { width: 100%; padding: 0; background: none; border: none; cursor: pointer; display: block; }

/* ── CATEGORY PILLS ── */
.section-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
.pills-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
.pills-scroll::-webkit-scrollbar { display: none; }
.pill { padding: 9px 16px; border-radius: 30px; border: 1px solid var(--border); background: var(--surface2); font-size: 14px; font-weight: 400; color: var(--muted); cursor: pointer; white-space: nowrap; font-family: var(--font); transition: all 0.15s; flex-shrink: 0; }
.pill.active { background: var(--green-soft); border-color: var(--green-border); color: var(--green); font-weight: 500; }

/* ── SUB PILLS ── */
.sub-area { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px; margin-top: 10px; margin-bottom: 0; }
.sub-pill { padding: 7px 13px; border-radius: 30px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; color: var(--muted); cursor: pointer; white-space: nowrap; font-family: var(--font); transition: all 0.15s; flex-shrink: 0; }
.sub-pill.active { background: var(--green-soft); border-color: var(--green-border); color: var(--green); font-weight: 500; }
.sub-pills-scroll { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
.sub-pills-scroll::-webkit-scrollbar { display: none; }

/* ── INPUTS ── */
.text-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; color: var(--text); font-size: 15px; font-family: var(--font); outline: none; margin-top: 10px; -webkit-appearance: none; }
.text-input::placeholder { color: var(--muted2); }
.text-input:focus { border-color: var(--green-border); }
input[type="date"].text-input { color-scheme: dark; }

/* ── SAVE BUTTON ── */
.save-btn { width: 100%; margin-top: 14px; background: var(--green); border: none; border-radius: var(--radius-sm); padding: 16px; font-size: 16px; font-weight: 600; color: #000; cursor: pointer; font-family: var(--font); letter-spacing: -0.2px; transition: opacity 0.15s; }
.save-btn:active { opacity: 0.85; }

/* ── BOTTOM NAV ── */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: rgba(14,14,17,0.92); border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 100; }
.nav-btn { flex: 1; background: none; border: none; padding: 14px 0 12px; color: var(--muted2); font-size: 11px; font-weight: 500; font-family: var(--font); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color 0.15s; letter-spacing: 0.03em; text-transform: uppercase; }
.nav-btn svg { width: 22px; height: 22px; stroke-width: 1.6; }
.nav-btn.active { color: var(--green); }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: flex-end; padding: 16px; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
.modal-overlay.hidden { display: none; }
.modal { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 22px; width: 100%; max-width: 430px; margin: 0 auto; }
.modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
.modal p { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
.modal input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; color: var(--text); font-size: 16px; font-family: var(--font); outline: none; margin-bottom: 14px; -webkit-appearance: none; }
.modal input::placeholder { color: var(--muted2); }
.modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-sec { padding: 13px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; font-family: var(--font); }
.btn-pri { padding: 13px; border-radius: var(--radius-sm); border: none; background: var(--green); font-size: 14px; font-weight: 600; color: #000; cursor: pointer; font-family: var(--font); }

/* ── SUMMARY PAGE ── */
.page-header { padding: calc(env(safe-area-inset-top) + 20px) 0 20px; }
.page-header h2 { font-size: 24px; font-weight: 600; letter-spacing: -0.4px; }
.page-header .month-label { font-size: 13px; color: var(--muted); margin-top: 3px; }
.summary-total-block { background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
.summary-total-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.summary-total-amt { font-size: 38px; font-weight: 600; color: var(--green); letter-spacing: -1.5px; }
.summary-total-count { font-size: 13px; color: var(--muted); margin-top: 4px; }
.summary-card { background: var(--surface); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px; border: 1px solid var(--border); }
.summary-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.summary-cat { font-size: 15px; font-weight: 500; }
.summary-amt { font-size: 15px; font-weight: 600; color: var(--green); }
.bar-track { height: 4px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.4s ease; }
.summary-pct { font-size: 12px; color: var(--muted); margin-top: 6px; }

/* ── HISTORY PAGE ── */
.history-group-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 16px 0 8px; }
.history-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 10px; }
.history-item { display: flex; align-items: center; padding: 13px 16px; border-bottom: 1px solid var(--border); gap: 12px; }
.history-item:last-child { border-bottom: none; }
.h-info { flex: 1; min-width: 0; }
.h-cat { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.h-amt { font-size: 15px; font-weight: 600; white-space: nowrap; }
.h-del { background: none; border: none; color: var(--muted2); cursor: pointer; padding: 6px; font-size: 18px; line-height: 1; display: flex; align-items: center; }
.trip-tag { display: inline-block; padding: 1px 7px; border-radius: 20px; background: var(--green-soft); border: 1px solid var(--green-border); color: var(--green); font-size: 10px; margin-left: 5px; vertical-align: middle; }

/* ── PAST TRIPS ── */
.past-trips-section { margin-top: 24px; }
.trip-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; }
.trip-card:active { border-color: var(--green-border); }
.trip-card-header { display: flex; justify-content: space-between; align-items: center; }
.trip-card-name { font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 7px; }
.trip-card-right { display: flex; align-items: center; gap: 10px; }
.trip-card-total { font-size: 15px; font-weight: 600; color: var(--green); }
.trip-card-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
.trip-del-btn { background: none; border: none; color: var(--muted2); cursor: pointer; padding: 4px; font-size: 16px; display: flex; align-items: center; }

/* ── TRIP DETAIL VIEW ── */
.detail-header { display: flex; align-items: center; gap: 12px; padding: calc(env(safe-area-inset-top) + 16px) 0 16px; }
.back-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.back-btn svg { width: 18px; height: 18px; stroke: var(--muted); }
.detail-title { flex: 1; font-size: 18px; font-weight: 600; }
.detail-total { font-size: 18px; font-weight: 600; color: var(--green); }
.detail-date-group { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 12px 0 6px; }

/* ── CATEGORY EDITOR ── */
.editor-header { display: flex; align-items: center; justify-content: space-between; padding: calc(env(safe-area-inset-top) + 16px) 0 16px; }
.editor-title { font-size: 22px; font-weight: 600; }
.editor-cat-block { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 12px; }
.editor-cat-row { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.editor-cat-name { flex: 1; font-size: 15px; font-weight: 500; }
.editor-subs { padding: 12px 16px 14px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.editor-chip { display: flex; align-items: center; gap: 5px; padding: 6px 8px 6px 12px; border-radius: 30px; border: 1px solid var(--border); background: var(--surface2); font-size: 13px; color: var(--text); }
.editor-chip.is-other { opacity: .45; }
.chip-del { background: none; border: none; cursor: pointer; color: var(--muted2); font-size: 14px; padding: 0; line-height: 1; display: flex; align-items: center; }
.chip-del:hover { color: var(--danger); }
.add-sub-btn { padding: 6px 12px; border-radius: 30px; border: 1px dashed var(--muted2); background: transparent; font-size: 13px; color: var(--muted); cursor: pointer; font-family: var(--font); }
.new-sub-input { padding: 6px 10px; border-radius: 30px; border: 1px solid var(--green-border); background: var(--surface2); font-size: 13px; color: var(--text); font-family: var(--font); outline: none; width: 130px; }
.confirm-sub-btn { padding: 6px 12px; border-radius: 30px; border: none; background: var(--green); font-size: 12px; font-weight: 600; color: #000; cursor: pointer; font-family: var(--font); }
.cancel-sub-btn { padding: 6px 10px; border-radius: 30px; border: 1px solid var(--border); background: transparent; font-size: 12px; color: var(--muted); cursor: pointer; font-family: var(--font); }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 48px 16px; color: var(--muted); font-size: 14px; line-height: 1.7; }
.empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
</style>
</head>
<body>

<!-- MODALS -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal" id="modal-box"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-add" onclick="showPage('add',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Add
  </button>
  <button class="nav-btn" id="nav-summary" onclick="showPage('summary',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Summary
  </button>
  <button class="nav-btn" id="nav-history" onclick="showPage('history',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
    History
  </button>
</nav>

<!-- ADD PAGE -->
<div class="page active" id="page-add">
  <div class="top-bar">
    <div>
      <h1>Today</h1>
      <div class="sub" id="add-date-label"></div>
    </div>
    <div class="top-right">
      <div class="today-total" id="today-total">฿0</div>
      <div class="sub" id="today-count"></div>
    </div>
  </div>

  <!-- Travel Banner -->
  <div id="travel-banner"></div>

  <!-- Amount Card -->
  <div class="amount-card" onclick="focusAmount()">
    <div class="amount-display" id="amount-display">
      <span class="placeholder" id="amount-placeholder">0</span>
      <span class="cursor" id="amount-cursor" style="display:none"></span>
    </div>
    <input class="amount-input-real" id="amount-input" type="number" inputmode="decimal" min="0" step="any" />
  </div>

  <!-- Category -->
  <div class="amount-card" style="padding:18px 18px 16px">
    <div class="section-label">Category</div>
    <div class="pills-scroll" id="cat-pills"></div>
    <div class="sub-area">
      <div class="section-label">Sub-category</div>
      <div class="sub-pills-scroll" id="sub-pills"></div>
    </div>
    <input class="text-input" id="note-input" type="text" placeholder="Short note (optional)" maxlength="60"/>
    <input class="text-input" id="date-input" type="date"/>
    <button class="save-btn" onclick="saveExpense()">Save Expense</button>
  </div>
</div>

<!-- SUMMARY PAGE -->
<div class="page" id="page-summary">
  <div class="page-header">
    <h2>Summary</h2>
    <div class="month-label" id="summary-month-label"></div>
  </div>
  <div id="summary-content"></div>
</div>

<!-- HISTORY PAGE -->
<div class="page" id="page-history">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div class="page-header" style="padding-right:0">
      <h2>History</h2>
      <div class="month-label">All entries</div>
    </div>
    <button onclick="openEditor()" style="background:var(--surface2);border:1px solid var(--border);border-radius:30px;padding:8px 14px;color:var(--muted);font-size:12px;font-family:var(--font);cursor:pointer;margin-top:calc(env(safe-area-inset-top) + 20px)">Edit categories</button>
  </div>
  <div id="history-content"></div>
  <div id="past-trips-section"></div>
</div>

<!-- TRIP DETAIL VIEW (hidden page) -->
<div class="page" id="page-trip-detail">
  <div id="trip-detail-content"></div>
</div>

<!-- CATEGORY EDITOR VIEW (hidden page) -->
<div class="page" id="page-editor">
  <div class="editor-header">
    <span class="editor-title">Sub-categories</span>
    <button class="btn-sec" onclick="closeEditor()" style="padding:8px 16px;font-size:13px">Done</button>
  </div>
  <div id="editor-content"></div>
</div>

<script>
// ── DEFAULT DATA ──
const DEFAULT_CATS = [
  {id:'food',       label:'Food',           subs:['Meal','Drinks','Desserts','Snacks','Other']},
  {id:'transport',  label:'Transportation', subs:['BTS/MRT','Grab','Other']},
  {id:'bills',      label:'Bills',          subs:['Internet','Entertainment','Other']},
  {id:'shopping',   label:'Shopping',       subs:['Clothes','Skincare','Miscellaneous','Other']},
  {id:'activities', label:'Activities',     subs:['Sports','Movie','Tickets','Other']},
  {id:'other',      label:'Other',          subs:['Other']},
];


// ── STORAGE ──
const STORAGE_VERSION = 5;
const LS = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)||'null'); } catch { return null; } },
  set: (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} },
};
function getCats() { return LS.get('cats_v4') || DEFAULT_CATS; }
function saveCats(c) { LS.set('cats_v4', c); }
function getAllExpenses() {
  const all = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('exp_')) {
      const arr = LS.get(k) || [];
      arr.forEach(e => all.push(e));
    }
  }
  return all.sort((a,b) => b.ts - a.ts);
}
function dayKey(dateStr) { return 'exp_' + dateStr.replace(/-/g,'_'); }
function loadDay(dateStr) { return LS.get(dayKey(dateStr)) || []; }
function saveDay(dateStr, arr) { LS.set(dayKey(dateStr), arr); }
function loadTrips() { return LS.get('trips_v4') || []; }
function saveTrips(t) { LS.set('trips_v4', t); }
function loadActiveTrip() { return LS.get('active_trip_v4'); }
function saveActiveTrip(t) { LS.set('active_trip_v4', t); }

// ── STATE ──
const S = {
  page: 'add',
  selCat: null,
  selSub: null,
  tripMode: false,
  tripName: '',
  tripStart: null,
  tripId: null,
  addingSubFor: null,
  prevPage: null,
};

function init() {
  const cats = getCats();
  S.selCat = cats[0].id;
  S.selSub = cats[0].subs[0];
  const at = loadActiveTrip();
  if (at) { S.tripMode = true; S.tripName = at.name; S.tripStart = at.start; S.tripId = at.id; }
  const today = todayStr();
  document.getElementById('date-input').value = today;
  document.getElementById('add-date-label').textContent = fmtDateLong(today);
  document.getElementById('summary-month-label').textContent = fmtMonthLabel();
  renderAll();
  setupAmountInput();
  const currentVersion = localStorage.getItem('storage_version');

if (currentVersion !== String(STORAGE_VERSION)) {
  localStorage.setItem('storage_version', STORAGE_VERSION);
}
}

// ── HELPERS ──
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtN(n) { return Math.round(n).toLocaleString('th-TH'); }
function fmtTime(ts) { return new Date(ts).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}); }
function fmtDateShort(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('th-TH',{month:'short',day:'numeric'});
}
function fmtDateLong(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('th-TH',{weekday:'long',month:'long',day:'numeric'});
}
function fmtMonthLabel() {
  return new Date().toLocaleDateString('th-TH',{month:'long',year:'numeric'});
}
function catById(id) { return getCats().find(c => c.id === id) || getCats().slice(-1)[0]; }

// ── AMOUNT INPUT ──
function setupAmountInput() {
  const inp = document.getElementById('amount-input');
  inp.addEventListener('input', updateAmountDisplay);
  inp.addEventListener('focus', () => {
    document.getElementById('amount-cursor').style.display = '';
  });
  inp.addEventListener('blur', () => {
    document.getElementById('amount-cursor').style.display = 'none';
  });
}
function focusAmount() {
  document.getElementById('amount-input').focus();
  updateAmountDisplay();
}
function updateAmountDisplay() {
  const inp = document.getElementById('amount-input');
  const disp = document.getElementById('amount-display');
  const placeholder = document.getElementById('amount-placeholder');
  const val = inp.value;
  if (val && parseFloat(val) > 0) {
    placeholder.textContent = '฿' + parseFloat(val).toLocaleString('th-TH', {maximumFractionDigits:2});
    placeholder.className = '';
  } else {
    placeholder.textContent = '0';
    placeholder.className = 'placeholder';
  }
}

// ── RENDER ALL ──
function renderAll() {
  renderTravelBanner();
  renderCatPills();
  renderSubPills();
  renderTodayTotal();
}

function renderTodayTotal() {
  const today = todayStr();
  const entries = loadDay(today);
  const total = entries.reduce((s,e) => s+e.amount, 0);
  document.getElementById('today-total').textContent = '฿' + fmtN(total);
  const cnt = entries.length;
  document.getElementById('today-count').textContent = cnt === 0 ? '' : cnt + ' expense' + (cnt>1?'s':'');
}

function renderTravelBanner() {
  const el = document.getElementById('travel-banner');
  if (S.tripMode) {
    const todayAmt = getAllExpenses().filter(e => e.tripId === S.tripId).reduce((s,e) => s+e.amount, 0);
    el.innerHTML = `<div class="travel-banner">
      <div class="travel-dot"></div>
      <div class="travel-info">
        <div class="travel-name">✈ ${S.tripName}</div>
        <div class="travel-meta">On travel · trip total ฿${fmtN(todayAmt)}</div>
      </div>
      <button class="travel-btn" onclick="openModal('trip-end')">End trip</button>
    </div>`;
  } else {
    el.innerHTML = `<div class="travel-banner off">
      <div class="travel-dot off"></div>
      <div class="travel-info">
        <div class="travel-name off">Travel mode off</div>
        <div class="travel-meta">Tap to start tracking a trip</div>
      </div>
      <button class="travel-btn off" onclick="openModal('trip-start')">Start trip</button>
    </div>`;
  }
}

function renderCatPills() {
  const cats = getCats();
  const el = document.getElementById('cat-pills');
  el.innerHTML = cats.map(c =>
    `<button class="pill${c.id===S.selCat?' active':''}" onmousedown="event.preventDefault()" onclick="selectCat('${c.id}')">${c.label}</button>`
  ).join('');
}

function renderSubPills() {
  const cat = catById(S.selCat);
  const el = document.getElementById('sub-pills');
  el.innerHTML = cat.subs.map(s =>
    `<button class="sub-pill${s===S.selSub?' active':''}" onmousedown="event.preventDefault()" onclick="selectSub('${s}')">${s}</button>`
  ).join('');
}

function selectCat(id) {
  S.selCat = id;
  S.selSub = catById(id).subs[0];
  renderCatPills();
  renderSubPills();
}
function selectSub(s) { S.selSub = s; renderSubPills(); }

// ── SAVE EXPENSE ──
function saveExpense() {
  const inp = document.getElementById('amount-input');
  const amt = parseFloat(inp.value);
  if (!amt || amt <= 0) { focusAmount(); return; }
  const note = document.getElementById('note-input').value.trim();
  const date = document.getElementById('date-input').value || todayStr();
  const arr = loadDay(date);
  arr.unshift({
  id: crypto.randomUUID(),
  amount: amt,
  category: S.selCat,
  subcategory: S.selSub,
  note,
  date,
  ts: Date.now(),
  tripId: S.tripMode ? S.tripId : null
});
  saveDay(date, arr);
  inp.value = '';
  document.getElementById('note-input').value = '';
  document.getElementById('date-input').value = todayStr();
  updateAmountDisplay();
  renderAll();
  // pulse feedback
  const btn = document.querySelector('.save-btn');
  btn.textContent = '✓ Saved';
  setTimeout(() => { btn.textContent = 'Save Expense'; }, 1200);
  if (document.getElementById('page-summary').classList.contains('active')) renderSummary();
  if (document.getElementById('page-history').classList.contains('active')) renderHistory();
}

// ── SUMMARY ──
function renderSummary() {
  const el = document.getElementById('summary-content');
  const month = todayStr().slice(0,7);
  const all = getAllExpenses().filter(e => e.date && e.date.startsWith(month));
  const total = all.reduce((s,e) => s+e.amount, 0);
  const cnt = all.length;

  if (cnt === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📊</div>No expenses this month yet.</div>`;
    return;
  }

  const bycat = {};
  all.forEach(e => { bycat[e.category] = (bycat[e.category]||0) + e.amount; });
  const max = Math.max(...Object.values(bycat));

  let h = `<div class="summary-total-block">
    <div class="summary-total-label">This month</div>
    <div class="summary-total-amt">฿${fmtN(total)}</div>
    <div class="summary-total-count">${cnt} expense${cnt!==1?'s':''}</div>
  </div>`;

  Object.entries(bycat).sort((a,b) => b[1]-a[1]).forEach(([catId, amt]) => {
    const cat = catById(catId);
    const pct = Math.round((amt/total)*100);
    const barW = Math.round((amt/max)*100);
    h += `<div class="summary-card">
      <div class="summary-row"><span class="summary-cat">${cat.label}</span><span class="summary-amt">฿${fmtN(amt)}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${barW}%"></div></div>
      <div class="summary-pct">${pct}% of total</div>
    </div>`;
  });

  el.innerHTML = h;
}

// ── HISTORY ──
function renderHistory() {
  const el = document.getElementById('history-content');
  const trips_el = document.getElementById('past-trips-section');
  const all = getAllExpenses();

  if (all.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>No expenses yet.<br>Add your first one!</div>`;
    trips_el.innerHTML = '';
    return;
  }

  // group by date
  const byDate = {};
  all.forEach(e => { (byDate[e.date] = byDate[e.date]||[]).push(e); });

  let h = '';
  Object.entries(byDate).sort((a,b) => b[0].localeCompare(a[0])).forEach(([date, items]) => {
    const dayTotal = items.reduce((s,e) => s+e.amount, 0);
    h += `<div class="history-group-label">${fmtDateShort(date)} · ฿${fmtN(dayTotal)}</div><div class="history-card">`;
    items.forEach((e, index) => {
      const cat = catById(e.category);
      const tripName = e.tripId ? getTripName(e.tripId) : '';
      const tb = tripName ? `<span class="trip-tag">✈ ${tripName}</span>` : '';
      h += `<div class="history-item">
        <div class="h-info">
          <div class="h-cat">${e.note || e.subcategory || cat.label}${tb}</div>
          <div class="h-meta">${cat.label} › ${e.subcategory} · ${fmtTime(e.ts)}</div>
        </div>
        <div class="h-amt">฿${fmtN(e.amount)}</div>
        <button class="h-del" onclick="deleteExpenseByIndex('${e.date}', ${index})">×</button>
      </div>`;
    });
    h += `</div>`;
  });
  el.innerHTML = h;

  // Past trips
  const trips = loadTrips().slice().reverse();
  if (trips.length === 0) { trips_el.innerHTML = ''; return; }
  let th = `<div class="past-trips-section"><div class="history-group-label" style="margin-top:24px">Past trips</div>`;
  trips.forEach(t => {
    th += `<div class="trip-card" onclick="viewTrip(${t.id})">
      <div class="trip-card-header">
        <span class="trip-card-name">✈ ${t.name}</span>
        <div class="trip-card-right">
          <span class="trip-card-total">฿${fmtN(t.total)}</span>
          <button class="trip-del-btn" onclick="deleteTrip(${t.id},event)">×</button>
        </div>
      </div>
      <div class="trip-card-meta">${fmtDateShort(new Date(t.start).toISOString().slice(0,10))} · ${t.count} expense${t.count!==1?'s':''}</div>
    </div>`;
  });
  th += `</div>`;
  trips_el.innerHTML = th;
}

function deleteExpenseByIndex(date, index) {
  const arr = loadDay(date);

  if (!Array.isArray(arr)) return;

  if (index < 0 || index >= arr.length) return;

  arr.splice(index, 1);

  saveDay(date, arr);

  renderTodayTotal();
  renderTravelBanner();
  renderHistory();

  if (document.getElementById('page-summary').classList.contains('active')) {
    renderSummary();
  }
}

function getTripName(tripId) {
  if (S.tripMode && tripId === S.tripId) return S.tripName;
  const t = loadTrips().find(t => t.id === tripId);
  return t ? t.name : 'trip';
}

function deleteExpense(id, date) {
  const arr = loadDay(date).filter(e => e.id !== id);

  saveDay(date, arr);

  renderTodayTotal();
  renderTravelBanner();
  renderHistory();

  if (document.getElementById('page-summary').classList.contains('active')) {
    renderSummary();
  }
}

function deleteTrip(id, ev) {
  ev.stopPropagation();
  saveTrips(loadTrips().filter(t => t.id !== id));
  renderHistory();
}

function viewTrip(tripId) {
  const trips = loadTrips();
  const trip = trips.find(t => t.id === tripId);
  if (!trip) return;
  const all = getAllExpenses().filter(e => e.tripId === tripId);
  all.sort((a,b) => a.ts - b.ts);
  const total = all.reduce((s,e) => s+e.amount, 0);

  let h = `<div class="detail-header">
    <button class="back-btn" onclick="closeDetail()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="detail-title">✈ ${trip.name}</div>
    <div class="detail-total">฿${fmtN(total)}</div>
  </div>`;

  if (all.length === 0) {
    h += `<div class="empty">No entries for this trip.</div>`;
  } else {
    const byDate = {};
    all.forEach(e => { (byDate[e.date] = byDate[e.date]||[]).push(e); });
    Object.entries(byDate).sort((a,b) => a[0].localeCompare(b[0])).forEach(([date, items]) => {
      h += `<div class="detail-date-group">${fmtDateShort(date)}</div><div class="history-card">`;
      items.forEach(e => {
        const cat = catById(e.category);
        h += `<div class="history-item">
          <div class="h-info">
            <div class="h-cat">${e.note || e.subcategory || cat.label}</div>
            <div class="h-meta">${cat.label} › ${e.subcategory} · ${fmtTime(e.ts)}</div>
          </div>
          <div class="h-amt">฿${fmtN(e.amount)}</div>
        </div>`;
      });
      h += `</div>`;
    });
  }

  document.getElementById('trip-detail-content').innerHTML = h;
  S.prevPage = S.page;
  showPage('trip-detail', null);
}

function closeDetail() {
  showPage(S.prevPage || 'history', document.getElementById('nav-' + (S.prevPage||'history')));
}

// ── CATEGORY EDITOR ──
function openEditor() {
  S.addingSubFor = null;
  renderEditor();
  S.prevPage = S.page;
  showPage('editor', null);
}
function closeEditor() {
  renderCatPills();
  renderSubPills();
  showPage(S.prevPage || 'history', document.getElementById('nav-' + (S.prevPage||'history')));
}
function renderEditor() {
  const cats = getCats();
  let h = '';
  cats.forEach(cat => {
    h += `<div class="editor-cat-block"><div class="editor-cat-row"><div class="editor-cat-name">${cat.label}</div></div><div class="editor-subs">`;
    cat.subs.forEach(s => {
      const isOther = s === 'Other';
      h += `<div class="editor-chip${isOther?' is-other':''}">${s}`;
      if (!isOther) h += `<button class="chip-del" onclick="deleteSub('${cat.id}','${s}')">×</button>`;
      h += `</div>`;
    });
    if (S.addingSubFor === cat.id) {
      h += `<input id="new-sub-in" class="new-sub-input" type="text" placeholder="Name…" maxlength="24"/>
            <button class="confirm-sub-btn" onclick="confirmAddSub('${cat.id}')">Add</button>
            <button class="cancel-sub-btn" onclick="S.addingSubFor=null;renderEditor()">✕</button>`;
    } else {
      h += `<button class="add-sub-btn" onclick="S.addingSubFor='${cat.id}';renderEditor()">+ Add</button>`;
    }
    h += `</div></div>`;
  });
  document.getElementById('editor-content').innerHTML = h;
  if (S.addingSubFor) {
    const inp = document.getElementById('new-sub-in');
    if (inp) { inp.focus(); inp.onkeydown = e => { if(e.key==='Enter') confirmAddSub(S.addingSubFor); if(e.key==='Escape'){S.addingSubFor=null;renderEditor();} }; }
  }
}
function deleteSub(catId, sub) {
  const cats = getCats();
  const cat = cats.find(c => c.id === catId);
  if (!cat || sub === 'Other') return;
  cat.subs = cat.subs.filter(s => s !== sub);
  saveCats(cats);
  if (S.selCat === catId && S.selSub === sub) S.selSub = cat.subs[0] || 'Other';
  renderEditor();
}
function confirmAddSub(catId) {
  const inp = document.getElementById('new-sub-in');
  if (!inp) return;
  const val = inp.value.trim();
  if (!val) return;
  const cats = getCats();
  const cat = cats.find(c => c.id === catId);
  if (!cat || cat.subs.includes(val)) return;
  const idx = cat.subs.indexOf('Other');
  if (idx >= 0) cat.subs.splice(idx, 0, val); else cat.subs.push(val);
  saveCats(cats);
  S.addingSubFor = null;
  renderEditor();
}

// ── MODALS ──
function openModal(type) {
  const overlay = document.getElementById('modal-overlay');
  const box = document.getElementById('modal-box');
  overlay.classList.remove('hidden');
  if (type === 'trip-start') {
    box.innerHTML = `<h3>Start a trip</h3><p>Name this trip to group its expenses separately.</p>
      <input id="trip-name-in" type="text" placeholder="e.g. Chiang Mai weekend" maxlength="40"/>
      <div class="modal-btns">
        <button class="btn-sec" onclick="closeModal()">Cancel</button>
        <button class="btn-pri" onclick="doStartTrip()">Start</button>
      </div>`;
    setTimeout(() => {
      const inp = document.getElementById('trip-name-in');
      if (inp) { inp.focus(); inp.onkeydown = e => { if(e.key==='Enter') doStartTrip(); }; }
    }, 50);
  } else if (type === 'trip-end') {
    const tripEntries = getAllExpenses().filter(e => e.tripId === S.tripId);
    const total = tripEntries.reduce((s,e) => s+e.amount, 0);
    box.innerHTML = `<h3>End trip?</h3><p>"${S.tripName}"<br>${tripEntries.length} expense${tripEntries.length!==1?'s':''} · ฿${fmtN(total)} total.<br>This trip will be saved to history.</p>
      <div class="modal-btns">
        <button class="btn-sec" onclick="closeModal()">Keep going</button>
        <button class="btn-pri" onclick="doEndTrip()">End & save</button>
      </div>`;
  }
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function doStartTrip() {
  const inp = document.getElementById('trip-name-in');
  const name = (inp && inp.value.trim()) || 'My trip';
  const id = Date.now();
  S.tripMode = true; S.tripName = name; S.tripStart = Date.now(); S.tripId = id;
  saveActiveTrip({name, start: S.tripStart, id});
  closeModal(); renderAll();
}
function doEndTrip() {
  const entries = getAllExpenses().filter(e => e.tripId === S.tripId);
  const total = entries.reduce((s,e) => s+e.amount, 0);
  const trips = loadTrips();
  trips.push({id: S.tripId, name: S.tripName, start: S.tripStart, end: Date.now(), total, count: entries.length});
  saveTrips(trips); saveActiveTrip(null);
  S.tripMode = false; S.tripName = ''; S.tripStart = null; S.tripId = null;
  closeModal(); renderAll(); renderHistory();
}

// ── PAGE SWITCHING ──
function showPage(pageId, btnEl) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  S.page = pageId;
  if (pageId === 'summary') renderSummary();
  if (pageId === 'history') renderHistory();
  window.scrollTo(0, 0);
}

// ── CLOSE MODAL ON OVERLAY CLICK ──
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

init();
</script>

<script>
// ADD BELOW STORAGE HELPERS

const DATA_VERSION = 5;

function sanitizeExpense(e = {}) {
  const cats = getCats();

  const safeCategory = cats.find(c => c.id === e.category)
    ? e.category
    : 'other';

  const safeSub = typeof e.subcategory === 'string' && e.subcategory.trim()
    ? e.subcategory
    : 'Other';

  const safeAmount = Number(e.amount);

  const safeDate = typeof e.date === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(e.date)
    ? e.date
    : todayStr();

  const safeTs = Number(e.ts) || Date.now();

  return {
    amount: isNaN(safeAmount) ? 0 : safeAmount,
    category: safeCategory,
    subcategory: safeSub,
    note: typeof e.note === 'string' ? e.note : '',
    date: safeDate,
    ts: safeTs,
    tripId: e.tripId || null,
  };
}

function migrateDataIfNeeded() {
  const currentVersion = LS.get('data_version') || 0;

  if (currentVersion >= DATA_VERSION) return;

  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);

    if (k && k.startsWith('exp_')) {
      const arr = LS.get(k) || [];

      const migrated = arr
        .filter(Boolean)
        .map(sanitizeExpense);

      LS.set(k, migrated);
    }
  }

  LS.set('data_version', DATA_VERSION);
}

// REPLACE getAllExpenses()
function normalizeExpense(e) {
  if (!e || typeof e !== 'object') return null;

  const amount = Number(e.amount);

  return {
    id: e.id || crypto.randomUUID(),
    amount: isNaN(amount) ? 0 : amount,
    category: e.category || 'other',
    subcategory: e.subcategory || 'Other',
    note: e.note || '',
    date: e.date || todayStr(),
    ts: Number(e.ts) || Date.now(),
    tripId: e.tripId || null
  };
}

function getAllExpenses() {
  const all = [];

  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);

    if (!k || !k.startsWith('exp_')) continue;

    try {
      const raw = localStorage.getItem(k);

      if (!raw) continue;

      const arr = JSON.parse(raw);

      if (!Array.isArray(arr)) continue;

      arr.forEach(item => {
        const fixed = normalizeExpense(item);

        if (fixed) {
          all.push(fixed);
        }
      });

    } catch (err) {
      console.error('Broken expense data:', k, err);
    }
  }

  return all.sort((a, b) => b.ts - a.ts);
}

// REPLACE loadDay()
function loadDay(dateStr) {
  try {
    const arr = LS.get(dayKey(dateStr));

    if (!Array.isArray(arr)) return [];

    return arr
      .map(normalizeExpense)
      .filter(Boolean);

  } catch {
    return [];
  }
}

// REPLACE fmtN()
function fmtN(n) {
  const safe = Number(n) || 0;
  return Math.round(safe).toLocaleString('th-TH');
}

// REPLACE fmtDateShort()
function fmtDateShort(str) {
  if (!str || typeof str !== 'string') {
    return 'Unknown date';
  }

  const d = new Date(str + 'T00:00:00');

  if (isNaN(d.getTime())) {
    return 'Unknown date';
  }

  return d.toLocaleDateString('th-TH', {
    month:'short',
    day:'numeric'
  });
}

// REPLACE fmtTime()
function fmtTime(ts) {
  const d = new Date(Number(ts));

  if (isNaN(d.getTime())) {
    return '--:--';
  }

  return d.toLocaleTimeString('th-TH', {
    hour:'2-digit',
    minute:'2-digit'
  });
}

// ADD EDIT FEATURE
function editExpense(ts, date) {
  const arr = loadDay(date);

  const idx = arr.findIndex(e => e.ts === ts);

  if (idx === -1) return;

  const exp = arr[idx];

  openEditModal(exp, updated => {
    arr[idx] = sanitizeExpense({
      ...exp,
      ...updated,
    });

    saveDay(date, arr);

    renderTodayTotal();
    renderTravelBanner();
    renderHistory();
    renderSummary();
  });
}

function openEditModal(exp, onSave) {
  const overlay = document.getElementById('modal-overlay');
  const box = document.getElementById('modal-box');

  overlay.classList.remove('hidden');

  box.innerHTML = `
    <h3>Edit expense</h3>

    <input
      id="edit-amount"
      type="number"
      value="${exp.amount}"
      placeholder="Amount"
    />

    <input
      id="edit-note"
      type="text"
      value="${exp.note || ''}"
      placeholder="Note"
    />

    <div class="modal-btns">
      <button class="btn-sec" onclick="closeModal()">Cancel</button>
      <button class="btn-pri" onclick="confirmEditExpense()">Save</button>
    </div>
  `;

  window.confirmEditExpense = function() {
    const amount = Number(document.getElementById('edit-amount').value);

    const note = document
      .getElementById('edit-note')
      .value
      .trim();

    onSave({
      amount: amount || exp.amount,
      note,
    });

    closeModal();
  };
}

// IMPORTANT
// Replace ALL:
// s + e.amount
// WITH:

</script>
